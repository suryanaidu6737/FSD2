<!DOCTYPE html>
<html>
<head>
<title>Registration Page</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

.register-box{
    width:450px;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:#003366;
}

table{
    width:100%;
}

td{
    padding:10px;
}

input[type=text],
input[type=password],
input[type=email],
input[type=number],
select,
textarea{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

textarea{
    resize:none;
}

.buttons{
    text-align:center;
}

input[type=submit],
input[type=reset]{
    background:#003366;
    color:white;
    border:none;
    padding:10px 20px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
}

input[type=submit]:hover,
input[type=reset]:hover{
    background:#ff6600;
}
</style>

</head>

<body>

<div class="register-box">

<h2>Registration Form</h2>

<form>

<table>

<tr>
<td><b>Full Name</b></td>
<td><input type="text"></td>
</tr>

<tr>
<td><b>Password</b></td>
<td><input type="password"></td>
</tr>

<tr>
<td><b>Email</b></td>
<td><input type="email"></td>
</tr>

<tr>
<td><b>Phone</b></td>
<td><input type="number"></td>
</tr>

<tr>
<td><b>Gender</b></td>
<td>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td><b>Course</b></td>
<td>
<select>
<option>B.Tech</option>
<option>M.Tech</option>
<option>MCA</option>
<option>MBA</option>
</select>
</td>
</tr>

<tr>
<td><b>Address</b></td>
<td><textarea rows="4"></textarea></td>
</tr>

<tr>
<td colspan="2" class="buttons">
<input type="submit" value="Register">
<input type="reset" value="Clear">
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
