<!DOCTYPE html>
<html>
<head>
<title>Book Catalogue</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

h2{
    text-align:center;
    color:#003366;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th{
    background:#003366;
    color:white;
    padding:10px;
}

td{
    text-align:center;
    padding:10px;
    border:1px solid #ccc;
}

img{
    width:80px;
    height:100px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>

</head>

<body>

<h2>Book Catalogue</h2>

<table>

<tr>
    <th>Book</th>
    <th>Book Name</th>
    <th>Author</th>
    <th>Price</th>
    <th>Action</th>
</tr>

<tr>
    <td><img src="java.jpg" alt="Java Book"></td>
    <td>Java Programming</td>
    <td>Herbert Schildt</td>
    <td>₹650</td>
    <td><button>Add to Cart</button></td>
</tr>

<tr>
    <td><img src="python.jpg" alt="Python Book"></td>
    <td>Python Programming</td>
    <td>Mark Lutz</td>
    <td>₹750</td>
    <td><button>Add to Cart</button></td>
</tr>

<tr>
    <td><img src="web.jpg" alt="Web Technologies"></td>
    <td>Web Technologies</td>
    <td>Kogent Learning</td>
    <td>₹500</td>
    <td><button>Add to Cart</button></td>
</tr>

<tr>
    <td><img src="os.jpg" alt="Operating Systems"></td>
    <td>Operating Systems</td>
    <td>Galvin</td>
    <td>₹700</td>
    <td><button>Add to Cart</button></td>
</tr>

</table>

</body>
</html>
