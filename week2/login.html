<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f2f2f2;
        }

        .login-box{
            width:350px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:#003366;
        }

        table{
            width:100%;
        }

        td{
            padding:10px;
        }

        input[type=text],
        input[type=password]{
            width:100%;
            padding:8px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        input[type=submit],
        input[type=reset]{
            width:100px;
            padding:10px;
            border:none;
            border-radius:5px;
            color:white;
            background:#003366;
            cursor:pointer;
        }

        input[type=submit]:hover,
        input[type=reset]:hover{
            background:#ff6600;
        }

        .buttons{
            text-align:center;
        }
    </style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form>

<table>

<tr>
    <td><b>Username</b></td>
    <td><input type="text" placeholder="Enter Username"></td>
</tr>

<tr>
    <td><b>Password</b></td>
    <td><input type="password" placeholder="Enter Password"></td>
</tr>

<tr>
    <td colspan="2" class="buttons">
        <input type="submit" value="Login">
        <input type="reset" value="Clear">
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <a href="registration.html">New User? Register Here</a>
    </td>
</tr>

</table>

</form>

</div>

</body>
</html>
