<!DOCTYPE html>
<html>
<head>
<title>Shopping Cart</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

h2{
    text-align:center;
    color:#003366;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th{
    background:#003366;
    color:white;
    padding:10px;
}

td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

.total{
    font-weight:bold;
    background:#e6f2ff;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>

</head>

<body>

<h2>Shopping Cart</h2>

<table>

<tr>
    <th>Book Name</th>
    <th>Price (₹)</th>
    <th>Quantity</th>
    <th>Amount (₹)</th>
</tr>

<tr>
    <td>Java Programming</td>
    <td>650</td>
    <td>1</td>
    <td>650</td>
</tr>

<tr>
    <td>Python Programming</td>
    <td>750</td>
    <td>2</td>
    <td>1500</td>
</tr>

<tr class="total">
    <td colspan="3" align="right">Total Amount</td>
    <td>₹2150</td>
</tr>

</table>

<br>

<center>
    <button>Proceed to Checkout</button>
</center>

</body>
</html>
